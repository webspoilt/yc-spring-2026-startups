apiVersion: apps/v1
kind: Deployment
metadata:
  name: spatial-transformer
  labels:
    app: spatial-transformer
    project: ai-monorepo
    step: "07"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spatial-transformer
  template:
    metadata:
      labels:
        app: spatial-transformer
    spec:
      containers:
      - name: spatial-transformer
        image: spatial-transformer:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: CUDA_VISIBLE_DEVICES
          value: "0"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: spatial-transformer
spec:
  selector:
    app: spatial-transformer
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
