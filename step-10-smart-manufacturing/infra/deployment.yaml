apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-mes
  labels:
    app: ai-mes
    project: ai-monorepo
    step: "10"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-mes
  template:
    metadata:
      labels:
        app: ai-mes
    spec:
      containers:
      - name: ai-mes
        image: ai-mes:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: MQTT_BROKER
          value: "mosquitto"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-mes
spec:
  selector:
    app: ai-mes
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
