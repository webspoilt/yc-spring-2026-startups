apiVersion: apps/v1
kind: Deployment
metadata:
  name: pm-cursor
  labels:
    app: pm-cursor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pm-cursor
  template:
    metadata:
      labels:
        app: pm-cursor
    spec:
      containers:
      - name: pm-cursor
        image: pm-cursor:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: pm-cursor-secrets
              key: database-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: pm-cursor-secrets
              key: openai-api-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pm-cursor
spec:
  selector:
    app: pm-cursor
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: v1
kind: Ingress
metadata:
  name: pm-cursor
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - pm-cursor.yourdomain.com
    secretName: pm-cursor-tls
  rules:
  - host: pm-cursor.yourdomain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pm-cursor
            port:
              number: 80
