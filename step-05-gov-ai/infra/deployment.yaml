apiVersion: apps/v1
kind: Deployment
metadata:
  name: gov-ai
  labels:
    app: gov-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gov-ai
  template:
    metadata:
      labels:
        app: gov-ai
    spec:
      containers:
      - name: gov-ai
        image: gov-ai:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: gov-ai-secrets
              key: aws-access-key
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: gov-ai-secrets
              key: aws-secret-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: gov-ai
spec:
  selector:
    app: gov-ai
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
